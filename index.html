<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeedDrop</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

#map {
  height:60vh;
  width:100%;
}

.panel {
  background:#111827;
  padding:15px;
}

button {
  padding:10px;
  margin-top:8px;
  width:100%;
  background:#2563eb;
  border:none;
  color:white;
  border-radius:6px;
  font-size:14px;
}

input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:6px;
  border:none;
}

#reader {
  margin-top:10px;
}
</style>
</head>
<body>

<div id="map"></div>

<div class="panel">
<input type="text" id="personName" placeholder="Scan or Enter Name">

<button onclick="startScan()">Scan Barcode</button>
<button onclick="lockLocation()">Lock Location</button>
<button onclick="unlockLocation()">Unlock Location</button>
<button onclick="openGoogleNav()">Open in Google Maps</button>

<div id="distance" style="margin-top:10px;"></div>
<div id="reader"></div>
</div>

<script src="app.js"></script>
</body>
</html>
